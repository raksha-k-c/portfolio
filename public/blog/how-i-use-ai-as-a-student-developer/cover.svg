<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow4" cx="60%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <rect width="1200" height="630" fill="url(#glow4)"/>

  <g fill="#ffffff" opacity="0.14">
    <circle cx="70" cy="70" r="2.5"/><circle cx="1130" cy="90" r="2"/><circle cx="60" cy="560" r="2.5"/>
    <circle cx="1140" cy="550" r="2"/><circle cx="600" cy="50" r="2"/>
  </g>

  <!-- neural network, top -->
  <g stroke="#ffffff" stroke-width="2.5" opacity="0.55">
    <line x1="420" y1="120" x2="600" y2="90"/>
    <line x1="420" y1="120" x2="600" y2="150"/>
    <line x1="480" y1="170" x2="600" y2="90"/>
    <line x1="480" y1="170" x2="600" y2="150"/>
    <line x1="600" y1="90" x2="780" y2="120"/>
    <line x1="600" y1="150" x2="780" y2="120"/>
    <line x1="600" y1="90" x2="780" y2="170"/>
    <line x1="600" y1="150" x2="780" y2="170"/>
  </g>
  <g fill="#ffffff">
    <circle cx="420" cy="120" r="9"/>
    <circle cx="480" cy="170" r="9"/>
    <circle cx="600" cy="90" r="9"/>
    <circle cx="600" cy="150" r="9"/>
    <circle cx="780" cy="120" r="9"/>
    <circle cx="780" cy="170" r="9"/>
  </g>

  <!-- laptop, center -->
  <g transform="translate(600 400)">
    <rect x="-170" y="-100" width="340" height="200" rx="14" fill="#ffffff" opacity="0.95"/>
    <rect x="-152" y="-82" width="304" height="150" rx="6" fill="#312e81"/>
    <!-- code lines on screen -->
    <g stroke="#7c3aed" stroke-width="7" stroke-linecap="round" opacity="0.9">
      <line x1="-130" y1="-55" x2="-40" y2="-55"/>
      <line x1="-110" y1="-25" x2="20" y2="-25"/>
      <line x1="-90" y1="5" x2="60" y2="5"/>
      <line x1="-110" y1="35" x2="-10" y2="35"/>
    </g>
    <!-- keyboard base -->
    <path d="M -200 100 L -170 100 L 170 100 L 200 100 L 180 150 L -180 150 Z" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- sparkle accents -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M 920 380 l 8 20 l 20 8 l -20 8 l -8 20 l -8 -20 l -20 -8 l 20 -8 Z"/>
    <path d="M 280 300 l 6 14 l 14 6 l -14 6 l -6 14 l -6 -14 l -14 -6 l 14 -6 Z" opacity="0.7"/>
  </g>
</svg>
