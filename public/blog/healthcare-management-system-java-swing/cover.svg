<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g fill="#ffffff" opacity="0.14">
    <circle cx="70" cy="60" r="2.5"/><circle cx="150" cy="110" r="2"/><circle cx="1130" cy="80" r="2.5"/>
    <circle cx="1050" cy="150" r="2"/><circle cx="60" cy="560" r="2.5"/><circle cx="1140" cy="570" r="2"/>
    <circle cx="980" cy="60" r="2"/><circle cx="300" cy="580" r="2"/>
  </g>

  <!-- dashboard window, left -->
  <g transform="translate(150 170)">
    <rect x="0" y="0" width="330" height="240" rx="14" fill="#ffffff" opacity="0.95"/>
    <rect x="0" y="0" width="330" height="34" rx="14" fill="#f3e8ff"/>
    <circle cx="20" cy="17" r="5" fill="#ec4899"/>
    <circle cx="38" cy="17" r="5" fill="#f59e0b"/>
    <circle cx="56" cy="17" r="5" fill="#22c55e"/>
    <!-- bar chart -->
    <g>
      <rect x="24" y="150" width="26" height="60" rx="4" fill="#8b5cf6" opacity="0.85"/>
      <rect x="62" y="120" width="26" height="90" rx="4" fill="#ec4899" opacity="0.85"/>
      <rect x="100" y="160" width="26" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
      <rect x="138" y="100" width="26" height="110" rx="4" fill="#ec4899" opacity="0.6"/>
    </g>
    <!-- list rows -->
    <rect x="200" y="70" width="110" height="10" rx="5" fill="#e9d5ff"/>
    <rect x="200" y="90" width="90" height="10" rx="5" fill="#e9d5ff"/>
    <rect x="200" y="110" width="100" height="10" rx="5" fill="#e9d5ff"/>
    <rect x="200" y="130" width="70" height="10" rx="5" fill="#e9d5ff"/>
  </g>

  <!-- medical cross badge, right -->
  <g transform="translate(880 200)">
    <circle cx="0" cy="0" r="90" fill="#ffffff" opacity="0.95"/>
    <g fill="#ec4899">
      <rect x="-14" y="-52" width="28" height="104" rx="8"/>
      <rect x="-52" y="-14" width="104" height="28" rx="8"/>
    </g>
  </g>

  <!-- java coffee cup, bottom center -->
  <g transform="translate(600 430)">
    <path d="M -60 0 h 120 l -12 70 a 12 12 0 0 1 -12 10 h -72 a 12 12 0 0 1 -12 -10 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M 60 10 q 40 0 40 30 q 0 30 -40 30" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.95"/>
    <g stroke="#8b5cf6" stroke-width="6" fill="none" opacity="0.7" stroke-linecap="round">
      <path d="M -20 -18 q 8 -20 0 -34"/>
      <path d="M 10 -18 q 8 -20 0 -34"/>
    </g>
  </g>
</svg>
