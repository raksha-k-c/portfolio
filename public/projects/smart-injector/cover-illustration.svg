<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deskWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a5a34"/>
      <stop offset="100%" stop-color="#6b4423"/>
    </linearGradient>
    <linearGradient id="ambient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#1b2436"/>
    </linearGradient>
    <linearGradient id="foamGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8de072"/>
      <stop offset="100%" stop-color="#5cbf4a"/>
    </linearGradient>
  </defs>

  <!-- ambient room background -->
  <rect width="1200" height="630" fill="url(#ambient)"/>
  <g fill="#ffffff" opacity="0.06">
    <circle cx="90" cy="70" r="2"/><circle cx="1120" cy="90" r="2"/><circle cx="1080" cy="540" r="2"/>
    <circle cx="60" cy="520" r="2"/><circle cx="600" cy="40" r="2"/>
  </g>

  <!-- desk surface -->
  <rect x="0" y="420" width="1200" height="210" fill="url(#deskWood)"/>
  <g stroke="#5a3a1e" stroke-width="2" opacity="0.5">
    <line x1="0" y1="460" x2="1200" y2="460"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- soft shadow where board meets desk -->
  <ellipse cx="560" cy="430" rx="480" ry="18" fill="#000000" opacity="0.25"/>

  <!-- green foam prop board, angled left -->
  <g transform="translate(230 300) rotate(-10)">
    <rect x="-90" y="-190" width="170" height="230" rx="10" fill="url(#foamGreen)"/>
    <rect x="-90" y="-190" width="170" height="230" rx="10" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- white foam-core base board -->
  <g transform="translate(600 340) rotate(-2)">
    <rect x="-330" y="-10" width="660" height="150" rx="10" fill="#f4f2ea"/>
    <rect x="-330" y="-10" width="660" height="150" rx="10" fill="#000000" opacity="0.03"/>

    <!-- breadboard -->
    <g transform="translate(-140 15)">
      <rect x="0" y="0" width="290" height="110" rx="6" fill="#e7e4da"/>
      <rect x="0" y="0" width="290" height="20" rx="4" fill="#d5d1c3"/>
      <rect x="0" y="90" width="290" height="20" rx="4" fill="#d5d1c3"/>
      <!-- hole grid -->
      <g fill="#9a9686">
        <g id="row">
          <circle cx="14" cy="45" r="2.2"/><circle cx="30" cy="45" r="2.2"/><circle cx="46" cy="45" r="2.2"/>
          <circle cx="62" cy="45" r="2.2"/><circle cx="78" cy="45" r="2.2"/><circle cx="94" cy="45" r="2.2"/>
          <circle cx="110" cy="45" r="2.2"/><circle cx="126" cy="45" r="2.2"/><circle cx="142" cy="45" r="2.2"/>
          <circle cx="158" cy="45" r="2.2"/><circle cx="174" cy="45" r="2.2"/><circle cx="190" cy="45" r="2.2"/>
          <circle cx="206" cy="45" r="2.2"/><circle cx="222" cy="45" r="2.2"/><circle cx="238" cy="45" r="2.2"/>
          <circle cx="254" cy="45" r="2.2"/><circle cx="270" cy="45" r="2.2"/>
        </g>
        <use href="#row" y="16"/>
        <use href="#row" y="-16"/>
      </g>
      <!-- ESP32-ish module -->
      <rect x="60" y="30" width="90" height="46" rx="4" fill="#1b2436"/>
      <g fill="#f0b400">
        <rect x="66" y="36" width="6" height="6"/><rect x="78" y="36" width="6" height="6"/>
        <rect x="90" y="36" width="6" height="6"/><rect x="102" y="36" width="6" height="6"/>
        <rect x="114" y="36" width="6" height="6"/><rect x="126" y="36" width="6" height="6"/>
      </g>
    </g>

    <!-- ultrasonic sensor module, right of breadboard -->
    <g transform="translate(190 40)">
      <rect x="0" y="0" width="86" height="46" rx="6" fill="#2c3547"/>
      <circle cx="22" cy="23" r="16" fill="#c7ccd6"/>
      <circle cx="22" cy="23" r="10" fill="#8b93a3"/>
      <circle cx="64" cy="23" r="16" fill="#c7ccd6"/>
      <circle cx="64" cy="23" r="10" fill="#8b93a3"/>
    </g>

    <!-- OLED display -->
    <g transform="translate(190 -2)">
      <rect x="0" y="0" width="70" height="36" rx="4" fill="#12161f"/>
      <rect x="6" y="6" width="58" height="24" rx="2" fill="#0a4d63"/>
      <g stroke="#37d6ff" stroke-width="1.6" opacity="0.85">
        <line x1="10" y1="12" x2="40" y2="12"/>
        <line x1="10" y1="18" x2="52" y2="18"/>
        <line x1="10" y1="24" x2="30" y2="24"/>
      </g>
    </g>
  </g>

  <!-- jumper wires arcing between modules -->
  <g fill="none" stroke-linecap="round" stroke-width="3.2" opacity="0.95">
    <path d="M 480 340 C 520 300 540 300 560 345" stroke="#e5484d"/>
    <path d="M 495 345 C 530 315 545 315 570 352" stroke="#3b82f6"/>
    <path d="M 470 355 C 510 330 560 330 610 358" stroke="#f5c518"/>
    <path d="M 690 355 C 720 320 740 320 760 352" stroke="#22c55e"/>
    <path d="M 700 365 C 730 340 750 340 780 360" stroke="#e5484d"/>
    <path d="M 660 320 C 690 290 720 295 745 322" stroke="#a855f7"/>
    <path d="M 600 300 C 630 260 660 260 680 300" stroke="#3b82f6" opacity="0.8"/>
  </g>

  <!-- ultrasonic sensing waves emitted forward -->
  <g stroke="#7dd3fc" fill="none" stroke-width="3" opacity="0.55">
    <path d="M 850 230 a 40 40 0 0 1 60 0" stroke-linecap="round"/>
    <path d="M 838 230 a 58 58 0 0 1 84 0" stroke-linecap="round" opacity="0.7"/>
    <path d="M 826 230 a 76 76 0 0 1 108 0" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- reaching-in gesture kept minimal: a soft shadow suggests a hand just out of frame -->
  <ellipse cx="1050" cy="290" rx="70" ry="26" fill="#000000" opacity="0.12"/>
</svg>
